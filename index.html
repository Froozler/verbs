<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Español PY 🇵🇾</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #111;
            --bg-alt: #1a1a1c;
            --text: #f4f4f5;
            --primary: #fbbf24;
            --error: #ef4444;
            --warning: #f97316;
            --success: #22c55e;
            --surface: #27272a;
            --surface-hover: #3f3f46;
            --locked: #52525b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* App Header */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #000; z-index: 20; border-bottom: 1px solid #222; }
        .title { font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; gap: 8px; }
        .global-score { font-size: 0.85rem; background: var(--surface); padding: 4px 10px; border-radius: 20px; color: var(--primary); font-weight: bold; }
        
        /* Top Navigation Tabs */
        .nav-tabs { display: flex; background: #000; padding: 10px 20px; gap: 10px; border-bottom: 1px solid #222; }
        .nav-tabs button { flex: 1; background: var(--surface); color: #a1a1aa; border: none; padding: 10px; border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.2s; }
        .nav-tabs button.active { background: var(--primary); color: #000; }

        /* Settings Strip */
        .settings-strip { display: flex; justify-content: flex-end; padding: 8px 20px; background: var(--bg-alt); border-bottom: 1px solid #222; font-size: 0.8rem; }
        .toggle-label { display: flex; align-items: center; gap: 6px; color: #a1a1aa; cursor: pointer; }

        /* Sidebar / Verb Selector */
        .sidebar { background: var(--surface); display: flex; gap: 10px; padding: 12px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #111; flex-shrink: 0; scrollbar-width: none; }
        .sidebar::-webkit-scrollbar { display: none; }
        .verb-chip { background: var(--bg); color: var(--text); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.95rem; border: 2px solid transparent; display: flex; align-items: center; gap: 8px; transition: 0.1s; }
        .verb-chip.selected { border-color: var(--primary); background: var(--bg-alt); }
        .verb-chip.locked { opacity: 0.4; cursor: not-allowed; border: 1px dashed var(--locked); background: transparent; }
        .chip-streak { font-size: 0.75rem; background: #000; padding: 2px 6px; border-radius: 10px; color: var(--primary); }

        /* Main Workspace */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 20px; align-items: center; background: var(--bg); }
        
        /* PRACTICE VIEW */
        #viewPractice { width: 100%; max-width: 450px; display: flex; flex-direction: column; align-items: center; }
        .card { background: var(--surface); width: 100%; padding: 30px 20px; border-radius: 16px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .meta-info { display: flex; justify-content: space-between; font-size: 0.85rem; color: #a1a1aa; margin-bottom: 20px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .pronoun { font-size: 1.3rem; color: var(--primary); margin-bottom: 4px; font-weight: bold; }
        .infinitive { font-size: 2.2rem; font-weight: 800; margin-bottom: 25px; letter-spacing: -1px; }
        
        /* ContentEditable Fake Input */
        .fake-input { width: 100%; background: var(--bg); border: 2px solid #3f3f46; color: white; padding: 15px; font-size: 1.4rem; border-radius: 8px; text-align: center; outline: none; margin-bottom: 15px; cursor: text; white-space: nowrap; overflow: hidden; min-height: 58px; font-weight: bold; transition: border-color 0.2s; }
        .fake-input:focus { border-color: var(--primary); }
        .fake-input:empty:before { content: attr(placeholder); color: #52525b; pointer-events: none; display: block; font-weight: normal; }

        .submit-btn { width: 100%; background: var(--primary); color: #000; font-weight: bold; font-size: 1.2rem; padding: 15px; border: none; border-radius: 8px; cursor: pointer; transition: transform 0.1s; }
        .submit-btn:active { transform: scale(0.98); }
        
        .feedback { margin-top: 15px; min-height: 70px; font-size: 1rem; text-align: left; background: #111; padding: 15px; border-radius: 8px; display: none; width: 100%; }
        .feedback.show { display: block; animation: popIn 0.2s ease-out; }
        @keyframes popIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .correct { border-left: 4px solid var(--success); }
        .warning { border-left: 4px solid var(--warning); }
        .incorrect { border-left: 4px solid var(--error); }
        .fb-title { font-weight: bold; margin-bottom: 6px; font-size: 1.1rem; }
        .fb-rule { font-size: 0.9rem; color: #a1a1aa; margin-bottom: 6px; line-height: 1.4; }
        .fb-example { font-size: 0.9rem; color: white; font-style: italic; opacity: 0.9; }

        /* REFERENCE VIEW */
        #viewReference { width: 100%; max-width: 600px; display: none; flex-direction: column; padding-bottom: 40px; }
        .ref-hero { margin-bottom: 25px; text-align: center; }
        .ref-hero h2 { font-size: 3rem; font-weight: 900; letter-spacing: -2px; color: white; margin-bottom: 5px; }
        .ref-hero .translation { font-size: 1.2rem; color: var(--primary); font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .ref-hero .desc { background: var(--surface); padding: 15px; border-radius: 8px; font-size: 0.95rem; color: #d4d4d8; line-height: 1.5; text-align: left; border-left: 4px solid var(--primary); }

        .ref-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 600px) { .ref-grid { grid-template-columns: 1fr 1fr; } }
        
        .tense-card { background: var(--bg-alt); border: 1px solid var(--surface-hover); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .tense-card.locked { opacity: 0.5; filter: grayscale(1); border-style: dashed; }
        .tense-card-header { background: var(--surface); padding: 12px 15px; font-weight: bold; color: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--surface-hover); }
        .tense-card-header .req { font-size: 0.75rem; background: #000; padding: 3px 8px; border-radius: 12px; color: var(--primary); }
        .locked .tense-card-header .req { color: var(--error); }
        
        .tense-list { padding: 10px 15px; list-style: none; display: flex; flex-direction: column; gap: 8px; }
        .tense-list li { display: flex; justify-content: space-between; font-size: 0.95rem; }
        .tense-list .pro { color: #a1a1aa; width: 40%; font-weight: 600; }
        .tense-list .conj { color: var(--text); width: 60%; font-family: monospace; font-size: 1.05rem; }
        .tense-list li.is-vos { background: #222; margin: -2px -10px; padding: 4px 10px; border-radius: 6px; border-left: 2px solid var(--primary); }
        .tense-list li.is-vos .pro { color: var(--primary); }

        /* Utility */
        .active-view { display: flex !important; }
    </style>
</head>
<body>

    <header>
        <div class="title">⚡️ Español PY</div>
        <div class="global-score" id="globalScoreDisplay">Lvl 0</div>
    </header>

    <div class="nav-tabs">
        <button id="tabPractice" class="active" onclick="switchTab('practice')">Practice</button>
        <button id="tabReference" onclick="switchTab('reference')">Reference</button>
    </div>

    <div class="settings-strip">
        <label class="toggle-label">
            <input type="checkbox" id="strictAccentsToggle"> Strict Accents (á, é, í, ó, ú)
        </label>
    </div>

    <div class="sidebar" id="verbList"></div>

    <div class="main-content">
        
        <div id="viewPractice" class="active-view">
            <div class="card">
                <div class="meta-info">
                    <span id="displayTense">Presente</span>
                    <span id="displayLevel">Streak: 0</span>
                </div>
                <div class="pronoun" id="displayPronoun">Vos</div>
                <div class="infinitive" id="displayInfinitive">hablar</div>
                
                <div id="answerInput" contenteditable="true" class="fake-input" placeholder="Type answer..." spellcheck="false" translate="no"></div>
                
                <button id="submitBtn" class="submit-btn">Check</button>
            </div>
            
            <div class="feedback" id="feedback">
                <div class="fb-title" id="fbTitle"></div>
                <div class="fb-rule" id="fbRule"></div>
                <div class="fb-example" id="fbExample"></div>
            </div>
        </div>

        <div id="viewReference">
            <div class="ref-hero">
                <h2 id="refInfinitive">...</h2>
                <div class="translation" id="refTranslation">...</div>
                <div class="desc" id="refDesc">...</div>
            </div>
            <div class="ref-grid" id="refGrid">
                </div>
        </div>

    </div>

    <script>
        // Core Data
        const pronouns = ["yo", "vos", "él/ella", "nosotros", "ellos/ellas"];
        
        const tenses = [
            { id: "present", name: "Presente", req: 0 },
            { id: "preterite", name: "Pretérito", req: 5 },
            { id: "imperfect", name: "Imperfecto", req: 10 },
            { id: "future", name: "Futuro", req: 15 },
            { id: "conditional", name: "Condicional", req: 20 },
            { id: "subjunctive", name: "Subjuntivo", req: 25 }
        ];

        const verbsDB = {
            "hablar": { trans: "to speak", type: "ar", root: "habl", unlockReq: 0, desc: "A standard regular -AR verb. Master this to learn the baseline pattern for all -ar verbs.", obj: "español rápido" },
            "tomar": { trans: "to take / to drink", type: "ar", root: "tom", unlockReq: 0, desc: "Standard -AR verb. Extremely common in Paraguay for drinking Tereré or taking transport.", obj: "un tereré" },
            "comer": { trans: "to eat", type: "er", root: "com", unlockReq: 10, desc: "Standard regular -ER verb. Notice how the endings shift from 'a' to 'e'.", obj: "chipa" },
            "vivir": { trans: "to live", type: "ir", root: "viv", unlockReq: 10, desc: "Standard regular -IR verb. Very similar to -ER verbs, but notice the 'vos' form (vivís).", obj: "acá" },
            "tener": { 
                trans: "to have", type: "irr", unlockReq: 15, futRoot: "tendr", obj: "tiempo",
                desc: "Highly common irregular verb (e -> ie). In the 'vos' present tense, it is regularized to 'tenés'.",
                present: ["tengo", "tenés", "tiene", "tenemos", "tienen"],
                preterite: ["tuve", "tuviste", "tuvo", "tuvimos", "tuvieron"],
                imperfect: ["tenía", "tenías", "tenía", "teníamos", "tenían"],
                subjunctive: ["tenga", "tengas", "tenga", "tengamos", "tengan"]
            },
            "poder": { 
                trans: "to be able to (can)", type: "irr", unlockReq: 25, futRoot: "podr", obj: "hacerlo",
                desc: "Stem-changing verb (o -> ue). IMPORTANT: In Paraguayan Voseo, 'vos' does NOT stem-change in the present tense (vos podés).",
                present: ["puedo", "podés", "puede", "podemos", "pueden"], 
                preterite: ["pude", "pudiste", "pudo", "pudimos", "pudieron"],
                imperfect: ["podía", "podías", "podía", "podíamos", "podían"],
                subjunctive: ["pueda", "puedas", "pueda", "podamos", "puedan"]
            },
            "querer": {
                trans: "to want", type: "irr", unlockReq: 25, futRoot: "querr", obj: "más",
                desc: "Stem-changing verb (e -> ie). Again, no stem change for 'vos' in the present (vos querés).",
                present: ["quiero", "querés", "quiere", "queremos", "quieren"],
                preterite: ["quise", "quisiste", "quiso", "quisimos", "quisieron"],
                imperfect: ["quería", "querías", "quería", "queríamos", "querían"],
                subjunctive: ["quiera", "quieras", "quiera", "queramos", "quieran"]
            },
            "ser": {
                trans: "to be (identity/permanent)", type: "irr", unlockReq: 40, obj: "de Paraguay",
                desc: "Highly irregular. Used for identity, origin, and permanent characteristics.",
                present: ["soy", "sos", "es", "somos", "son"],
                preterite: ["fui", "fuiste", "fue", "fuimos", "fueron"],
                imperfect: ["era", "eras", "era", "éramos", "eran"],
                subjunctive: ["sea", "seas", "sea", "seamos", "sean"]
            },
            "estar": {
                trans: "to be (location/state)", type: "irr", unlockReq: 40, obj: "listo",
                desc: "Irregular. Used for locations, temporary states, and feelings.",
                present: ["estoy", "estás", "está", "estamos", "están"],
                preterite: ["estuve", "estuviste", "estuvo", "estuvimos", "estuvieron"],
                imperfect: ["estaba", "estabas", "estaba", "estábamos", "estaban"],
                subjunctive: ["esté", "estés", "esté", "estemos", "estén"]
            },
            "ir": {
                trans: "to go", type: "irr", unlockReq: 60, obj: "al mercado",
                desc: "Highly irregular. The preterite (past) is identically shared with the verb 'ser'.",
                present: ["voy", "vas", "va", "vamos", "van"],
                preterite: ["fui", "fuiste", "fue", "fuimos", "fueron"],
                imperfect: ["iba", "ibas", "iba", "íbamos", "iban"],
                subjunctive: ["vaya", "vayas", "vaya", "vayamos", "vayan"]
            }
        };

        const regularEndings = {
            present: { ar: ["o", "ás", "a", "amos", "an"], er: ["o", "és", "e", "emos", "en"], ir: ["o", "ís", "e", "imos", "en"] },
            preterite: { ar: ["é", "aste", "ó", "amos", "aron"], er: ["í", "iste", "ió", "imos", "ieron"], ir: ["í", "iste", "ió", "imos", "ieron"] },
            imperfect: { ar: ["aba", "abas", "aba", "ábamos", "aban"], er: ["ía", "ías", "ía", "íamos", "ían"], ir: ["ía", "ías", "ía", "íamos", "ían"] },
            future: ["é", "ás", "á", "emos", "án"],
            conditional: ["ía", "ías", "ía", "íamos", "ían"],
            subjunctive: { ar: ["e", "és", "e", "emos", "en"], er: ["a", "ás", "a", "amos", "an"], ir: ["a", "ás", "a", "amos", "an"] }
        };

        // State & Storage Engine
        let userData = JSON.parse(localStorage.getItem('pySpanishV7')) || { lastActive: new Date().toDateString(), verbs: {} };
        Object.keys(verbsDB).forEach(v => { if (!userData.verbs[v]) userData.verbs[v] = { streak: 0 }; });

        let today = new Date().toDateString();
        if (userData.lastActive !== today) {
            // Apply decay
            Object.keys(verbsDB).forEach(v => { userData.verbs[v].streak = Math.max(0, userData.verbs[v].streak - 2); });
            userData.lastActive = today;
            localStorage.setItem('pySpanishV7', JSON.stringify(userData));
        }

        let state = { currentVerb: "hablar", currentTense: null, currentPronounIdx: 0, correctAnswer: "", globalScore: 0, view: 'practice' };

        // DOM Setup
        const elInput = document.getElementById('answerInput');
        const elFeedback = document.getElementById('feedback');
        const viewPractice = document.getElementById('viewPractice');
        const viewReference = document.getElementById('viewReference');

        const removeAccents = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        // Prevent rich text pasting in contenteditable
        elInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            document.execCommand('insertText', false, text);
        });

        // App Logic
        function getConjugation(verbInf, tenseId, pIdx) {
            const v = verbsDB[verbInf];
            if (tenseId === "future") return (v.futRoot || verbInf) + regularEndings.future[pIdx];
            if (tenseId === "conditional") return (v.futRoot || verbInf) + regularEndings.conditional[pIdx];
            if (v.type === "irr") return v[tenseId][pIdx];
            return v.root + regularEndings[tenseId][v.type][pIdx];
        }

        function calculateGlobalScore() {
            state.globalScore = Object.values(userData.verbs).reduce((sum, v) => sum + v.streak, 0);
            document.getElementById('globalScoreDisplay').innerText = `Total Mastery: ${state.globalScore}`;
        }

        function renderSidebar() {
            calculateGlobalScore();
            const elVerbList = document.getElementById('verbList');
            elVerbList.innerHTML = "";

            Object.entries(verbsDB).forEach(([v, data]) => {
                const isLocked = state.globalScore < data.unlockReq;
                const streak = userData.verbs[v].streak;
                
                const div = document.createElement('div');
                div.className = `verb-chip ${v === state.currentVerb ? 'selected' : ''} ${isLocked ? 'locked' : ''}`;
                
                if (isLocked) {
                    div.innerHTML = `🔒 ${v} <span class="chip-streak">Req ${data.unlockReq}</span>`;
                } else {
                    div.innerHTML = `${v} <span class="chip-streak">🔥 ${streak}</span>`;
                    div.onclick = () => { 
                        state.currentVerb = v; 
                        renderSidebar(); 
                        if(state.view === 'practice') { generateQuestion(); } 
                        if(state.view === 'reference') { renderReference(); }
                    };
                }
                elVerbList.appendChild(div);
            });
        }

        function generateQuestion() {
            const streak = userData.verbs[state.currentVerb].streak;
            let available = tenses.filter(t => streak >= t.req);
            if (available.length === 0) available = [tenses[0]]; // Fallback safety
            
            state.currentTense = available[Math.floor(Math.random() * available.length)];
            state.currentPronounIdx = Math.floor(Math.random() * pronouns.length);
            state.correctAnswer = getConjugation(state.currentVerb, state.currentTense.id, state.currentPronounIdx);

            document.getElementById('displayTense').innerText = state.currentTense.name;
            document.getElementById('displayLevel').innerText = `🔥 ${streak}`;
            document.getElementById('displayPronoun').innerText = pronouns[state.currentPronounIdx].toUpperCase();
            document.getElementById('displayInfinitive').innerText = state.currentVerb;
            
            elInput.innerText = "";
            elFeedback.className = "feedback"; // Hide feedback
            if (state.view === 'practice') elInput.focus();
        }

        function generateRuleText(verbInf, tenseId) {
            const v = verbsDB[verbInf];
            if (tenseId === "subjunctive") return `Subjunctive: Used for doubts, wishes, emotions. Usually triggered by 'que'.`;
            if (v.type === "irr" && ["present", "preterite", "imperfect"].includes(tenseId)) return `Irregular verb in the ${tenseId}.`;
            if (tenseId === "future" || tenseId === "conditional") return `Add ending to the ${v.futRoot ? "irregular stem" : "full infinitive"}.`;
            return `Regular ${v.type.toUpperCase()} verb. Follows standard ending rules.`;
        }

        function checkAnswer() {
            if (state.view !== 'practice') return;

            const rawUser = elInput.innerText.trim().toLowerCase();
            const rawCorrect = state.correctAnswer.toLowerCase();
            if (!rawUser) return;

            const isStrict = document.getElementById('strictAccentsToggle').checked;
            elFeedback.className = "feedback show";

            let isCorrect = false, feedbackType = "", titleText = "";

            if (rawUser === rawCorrect) {
                isCorrect = true; feedbackType = "correct"; titleText = "¡Perfecto! 🔥";
            } else if (!isStrict && removeAccents(rawUser) === removeAccents(rawCorrect)) {
                isCorrect = true; feedbackType = "warning"; titleText = `Pass! But note the accent: ${rawCorrect}`;
            } else {
                feedbackType = "incorrect"; titleText = `Incorrect. Answer: ${rawCorrect}`;
            }

            const currentStreak = userData.verbs[state.currentVerb].streak;

            if (isCorrect) {
                userData.verbs[state.currentVerb].streak++;
                elFeedback.innerHTML = `<div class="fb-title">${titleText}</div>`;
                elFeedback.classList.add(feedbackType);
                localStorage.setItem('pySpanishV7', JSON.stringify(userData));
                renderSidebar();
                setTimeout(() => generateQuestion(), 900);
            } else {
                userData.verbs[state.currentVerb].streak = Math.max(0, currentStreak - 2);
                const obj = verbsDB[state.currentVerb].obj;
                const p = pronouns[state.currentPronounIdx].split('/')[0]; // Clean up 'él/ella' to just 'él' for the example
                
                elFeedback.innerHTML = `
                    <div class="fb-title">${titleText}</div>
                    <div class="fb-rule">Rule: ${generateRuleText(state.currentVerb, state.currentTense.id)}</div>
                    <div class="fb-example">Ejemplo: ${p.charAt(0).toUpperCase() + p.slice(1)} ${rawCorrect} ${obj}.</div>
                `;
                elFeedback.classList.add(feedbackType);
                localStorage.setItem('pySpanishV7', JSON.stringify(userData));
                renderSidebar();
                
                // If they miss it, force them to clear it manually or wait slightly longer so they can read the rule
                setTimeout(() => elInput.focus(), 100);
            }
        }

        function renderReference() {
            const verbInf = state.currentVerb;
            const v = verbsDB[verbInf];
            const currentStreak = userData.verbs[verbInf].streak;

            document.getElementById('refInfinitive').innerText = verbInf;
            document.getElementById('refTranslation').innerText = `"${v.trans}"`;
            document.getElementById('refDesc').innerText = v.desc;
            
            const grid = document.getElementById('refGrid');
            grid.innerHTML = "";

            tenses.forEach(t => {
                const isLocked = currentStreak < t.req;
                
                let html = `
                    <div class="tense-card ${isLocked ? 'locked' : ''}">
                        <div class="tense-card-header">
                            <span>${t.name}</span> 
                            <span class="req">${isLocked ? `🔒 Unlocks at 🔥 ${t.req}` : `Unlocked`}</span>
                        </div>
                        <ul class="tense-list">
                `;
                
                pronouns.forEach((p, idx) => {
                    const conj = getConjugation(verbInf, t.id, idx);
                    // Special highlight for 'vos' row
                    const isVos = (idx === 1) ? "is-vos" : "";
                    
                    html += `
                        <li class="${isVos}">
                            <span class="pro">${p}</span>
                            <span class="conj">${conj}</span>
                        </li>
                    `;
                });
                
                html += `</ul></div>`;
                grid.innerHTML += html;
            });
        }

        // View Controller
        window.switchTab = function(targetView) {
            state.view = targetView;
            
            document.getElementById('tabPractice').classList.toggle('active', targetView === 'practice');
            document.getElementById('tabReference').classList.toggle('active', targetView === 'reference');
            
            if (targetView === 'practice') {
                viewReference.classList.remove('active-view');
                viewPractice.classList.add('active-view');
                generateQuestion();
            } else {
                viewPractice.classList.remove('active-view');
                viewReference.classList.add('active-view');
                renderReference();
            }
        };

        // Listeners
        document.getElementById('submitBtn').addEventListener('click', checkAnswer);
        
        // Enter key handling for the fake input
        elInput.addEventListener('keydown', (e) => { 
            if (e.key === 'Enter') {
                e.preventDefault(); 
                checkAnswer(); 
            }
        });

        // Initialize App
        renderSidebar();
        generateQuestion();
    </script>
</body>
</html>
