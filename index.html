<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Español PY 🇵🇾</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #111;
            --text: #f4f4f5;
            --primary: #fbbf24;
            --error: #ef4444;
            --warning: #f97316;
            --success: #22c55e;
            --surface: #27272a;
            --surface-hover: #3f3f46;
            --locked: #52525b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100dvh; overflow: hidden; }
        
        /* Header & Nav */
        header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: #000; z-index: 10; border-bottom: 1px solid #222; }
        .title { font-weight: 800; font-size: 1.2rem; }
        .menu-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        #topMenu { background: #000; padding: 0 20px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease; border-bottom: 1px solid #222; }
        #topMenu.open { max-height: 200px; padding: 15px 20px; }
        .menu-controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .menu-controls button { background: var(--surface); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; flex: 1; text-align: center; }
        .menu-controls button.active { background: var(--primary); color: black; }
        .toggle-label { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #a1a1aa; cursor: pointer; }

        /* Sidebar / Verb Selector */
        .sidebar { background: var(--surface); display: flex; gap: 10px; padding: 10px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #111; flex-shrink: 0; }
        .verb-chip { background: var(--bg); color: var(--text); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.9rem; border: 1px solid transparent; display: flex; align-items: center; gap: 6px; }
        .verb-chip.selected { border-color: var(--primary); color: var(--primary); }
        .verb-chip.locked { opacity: 0.5; cursor: not-allowed; background: transparent; border: 1px dashed var(--locked); }
        .chip-streak { font-size: 0.7rem; background: #000; padding: 2px 6px; border-radius: 10px; color: #fff; }

        /* Main Workspace */
        .main-content { flex: 1; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; }
        
        /* Practice Card */
        .card { background: var(--surface); width: 100%; max-width: 450px; padding: 25px 20px; border-radius: 16px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 20px; }
        .meta-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: #a1a1aa; margin-bottom: 15px; text-transform: uppercase; font-weight: bold; }
        .pronoun { font-size: 1.2rem; color: var(--primary); margin-bottom: 2px; font-weight: bold; }
        .infinitive { font-size: 2rem; font-weight: 800; margin-bottom: 20px; letter-spacing: -1px; }
        
        /* The Anti-Autofill Hack:
           type="search" stops Chrome Android from injecting card/password prompts.
           The CSS below removes the default 'x' clear button that search inputs normally have.
        */
        input { width: 100%; background: var(--bg); border: 2px solid #3f3f46; color: white; padding: 12px; font-size: 1.2rem; border-radius: 8px; text-align: center; outline: none; margin-bottom: 15px; }
        input:focus { border-color: var(--primary); }
        input[type="search"]::-webkit-search-decoration,
        input[type="search"]::-webkit-search-cancel-button,
        input[type="search"]::-webkit-search-results-button,
        input[type="search"]::-webkit-search-results-decoration { -webkit-appearance: none; }
        
        .submit-btn { width: 100%; background: var(--primary); color: #000; font-weight: bold; font-size: 1.2rem; padding: 12px; border: none; border-radius: 8px; cursor: pointer; }
        
        .feedback { margin-top: 15px; min-height: 60px; font-size: 1rem; text-align: left; background: #111; padding: 10px; border-radius: 8px; display: none; }
        .feedback.show { display: block; }
        .correct { border-left: 4px solid var(--success); }
        .warning { border-left: 4px solid var(--warning); }
        .incorrect { border-left: 4px solid var(--error); }
        .fb-title { font-weight: bold; margin-bottom: 4px; }
        .fb-rule { font-size: 0.85rem; color: #a1a1aa; margin-bottom: 4px; }
        .fb-example { font-size: 0.85rem; color: white; font-style: italic; }

        /* Dynamic Wiki View */
        .wiki { display: none; width: 100%; max-width: 600px; color: #d4d4d8; padding-bottom: 40px; }
        .wiki-header { margin-bottom: 20px; border-bottom: 1px solid var(--surface-hover); padding-bottom: 15px; }
        .wiki-header h2 { color: var(--primary); font-size: 2rem; margin-bottom: 5px; text-transform: capitalize; }
        .wiki-translation { font-size: 1.1rem; color: white; font-weight: bold; margin-bottom: 10px; }
        .wiki-desc { font-size: 0.9rem; line-height: 1.5; color: #a1a1aa; }
        .wiki-select { width: 100%; padding: 10px; background: var(--surface); color: white; border: 1px solid var(--primary); border-radius: 8px; margin-bottom: 20px; font-size: 1rem; outline: none; }
        
        .wiki-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media (min-width: 600px) { .wiki-grid { grid-template-columns: 1fr 1fr; } }
        .tense-table { background: var(--surface); border-radius: 8px; overflow: hidden; font-size: 0.9rem; }
        .tense-table-header { background: #111; padding: 8px 12px; font-weight: bold; color: var(--primary); display: flex; justify-content: space-between; border-bottom: 1px solid #222; }
        .tense-row { display: flex; padding: 6px 12px; border-bottom: 1px solid #3f3f46; }
        .tense-row:last-child { border-bottom: none; }
        .tense-pro { width: 40%; color: #a1a1aa; font-weight: bold; }
        .tense-conj { width: 60%; color: white; }

        .visible { display: flex !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <div class="title">🇵🇾 Español PY</div>
        <button class="menu-btn" onclick="document.getElementById('topMenu').classList.toggle('open')">Menu ▼</button>
    </header>

    <div id="topMenu">
        <div class="menu-controls">
            <button id="btnPractice" class="active">Practice</button>
            <button id="btnWiki">Dynamic Wiki</button>
        </div>
        <label class="toggle-label">
            <input type="checkbox" id="strictAccentsToggle"> Strict Accents (Require á, é, í, ó, ú)
        </label>
        <div style="margin-top: 10px; font-size: 0.8rem; color: var(--primary);" id="globalScoreDisplay">Global Mastery: 0</div>
    </div>

    <div class="sidebar" id="verbList"></div>

    <div class="main-content">
        <div id="viewPractice" class="card">
            <div class="meta-info">
                <span id="displayTense">Presente</span>
                <span id="displayLevel">Lvl 1</span>
            </div>
            <div class="pronoun" id="displayPronoun">Vos</div>
            <div class="infinitive" id="displayInfinitive">hablar</div>
            
            <input type="search" id="answerInput" name="espy_answer_qval" autocomplete="off" placeholder="Conjugate..." spellcheck="false" autocorrect="off" autocapitalize="none" data-lpignore="true">
            <button id="submitBtn" class="submit-btn">Check</button>
            
            <div class="feedback" id="feedback">
                <div class="fb-title" id="fbTitle"></div>
                <div class="fb-rule" id="fbRule"></div>
                <div class="fb-example" id="fbExample"></div>
            </div>
        </div>

        <div id="viewWiki" class="wiki hidden" style="flex-direction: column;">
            <select class="wiki-select" id="wikiVerbSelect"></select>
            
            <div class="wiki-header">
                <h2 id="wikiInfinitive">hablar</h2>
                <div class="wiki-translation" id="wikiTranslation">to speak</div>
                <div class="wiki-desc" id="wikiDesc">Regular -AR verb.</div>
            </div>

            <div class="wiki-grid" id="wikiGrid">
                </div>
        </div>
    </div>

    <script>
        // Linguistics Engine
        const pronouns = ["yo", "vos", "él/ella", "nosotros", "ellos/ellas"];
        
        const tenses = [
            { id: "present", name: "Presente", req: 0 },
            { id: "preterite", name: "Pretérito", req: 5 },
            { id: "imperfect", name: "Imperfecto", req: 10 },
            { id: "future", name: "Futuro", req: 15 },
            { id: "conditional", name: "Condicional", req: 20 },
            { id: "subjunctive", name: "Subjuntivo", req: 25 }
        ];

        const verbsDB = {
            "hablar": { trans: "to speak", type: "ar", root: "habl", unlockReq: 0, desc: "A standard regular -AR verb. Master this to learn the baseline pattern for all -ar verbs.", obj: "español" },
            "tomar": { trans: "to take / to drink", type: "ar", root: "tom", unlockReq: 0, desc: "Standard -AR verb. Extremely common in Paraguay for drinking Tereré or taking transport.", obj: "tereré" },
            
            "comer": { trans: "to eat", type: "er", root: "com", unlockReq: 10, desc: "Standard regular -ER verb. Notice how the endings shift from 'a' to 'e'.", obj: "chipa" },
            "vivir": { trans: "to live", type: "ir", root: "viv", unlockReq: 10, desc: "Standard regular -IR verb. Very similar to -ER verbs, but notice the 'vos' form (vivís).", obj: "acá" },
            
            "poder": { 
                trans: "to be able to (can)", type: "irr", unlockReq: 25, futRoot: "podr", obj: "hacerlo",
                desc: "Stem-changing verb (o -> ue). IMPORTANT: In Paraguayan Voseo, 'vos' does NOT stem-change in the present tense (vos podés).",
                present: ["puedo", "podés", "puede", "podemos", "pueden"], 
                preterite: ["pude", "pudiste", "pudo", "pudimos", "pudieron"],
                imperfect: ["podía", "podías", "podía", "podíamos", "podían"],
                subjunctive: ["pueda", "puedas", "pueda", "podamos", "puedan"]
            },
            "querer": {
                trans: "to want", type: "irr", unlockReq: 25, futRoot: "querr", obj: "más",
                desc: "Stem-changing verb (e -> ie). Again, no stem change for 'vos' in the present (vos querés).",
                present: ["quiero", "querés", "quiere", "queremos", "quieren"],
                preterite: ["quise", "quisiste", "quiso", "quisimos", "quisieron"],
                imperfect: ["quería", "querías", "quería", "queríamos", "querían"],
                subjunctive: ["quiera", "quieras", "quiera", "queramos", "quieran"]
            },
            
            "ser": {
                trans: "to be (identity/permanent)", type: "irr", unlockReq: 40, obj: "paraguayo",
                desc: "Highly irregular. Used for identity, origin, and permanent characteristics.",
                present: ["soy", "sos", "es", "somos", "son"],
                preterite: ["fui", "fuiste", "fue", "fuimos", "fueron"],
                imperfect: ["era", "eras", "era", "éramos", "eran"],
                subjunctive: ["sea", "seas", "sea", "seamos", "sean"]
            },
            "estar": {
                trans: "to be (location/state)", type: "irr", unlockReq: 40, obj: "listo",
                desc: "Irregular. Used for locations, temporary states, and feelings.",
                present: ["estoy", "estás", "está", "estamos", "están"],
                preterite: ["estuve", "estuviste", "estuvo", "estuvimos", "estuvieron"],
                imperfect: ["estaba", "estabas", "estaba", "estábamos", "estaban"],
                subjunctive: ["esté", "estés", "esté", "estemos", "estén"]
            },
            "ir": {
                trans: "to go", type: "irr", unlockReq: 60, obj: "al centro",
                desc: "Highly irregular. The preterite (past) is identically shared with the verb 'ser'.",
                present: ["voy", "vas", "va", "vamos", "van"],
                preterite: ["fui", "fuiste", "fue", "fuimos", "fueron"],
                imperfect: ["iba", "ibas", "iba", "íbamos", "iban"],
                subjunctive: ["vaya", "vayas", "vaya", "vayamos", "vayan"]
            }
        };

        const regularEndings = {
            present: { ar: ["o", "ás", "a", "amos", "an"], er: ["o", "és", "e", "emos", "en"], ir: ["o", "ís", "e", "imos", "en"] },
            preterite: { ar: ["é", "aste", "ó", "amos", "aron"], er: ["í", "iste", "ió", "imos", "ieron"], ir: ["í", "iste", "ió", "imos", "ieron"] },
            imperfect: { ar: ["aba", "abas", "aba", "ábamos", "aban"], er: ["ía", "ías", "ía", "íamos", "ían"], ir: ["ía", "ías", "ía", "íamos", "ían"] },
            future: ["é", "ás", "á", "emos", "án"],
            conditional: ["ía", "ías", "ía", "íamos", "ían"],
            subjunctive: { ar: ["e", "és", "e", "emos", "en"], er: ["a", "ás", "a", "amos", "an"], ir: ["a", "ás", "a", "amos", "an"] }
        };

        // Storage & Decay
        let userData = JSON.parse(localStorage.getItem('pySpanishV4')) || { lastActive: new Date().toDateString(), verbs: {} };
        Object.keys(verbsDB).forEach(v => { if (!userData.verbs[v]) userData.verbs[v] = { streak: 0 }; });

        let today = new Date().toDateString();
        if (userData.lastActive !== today) {
            Object.keys(verbsDB).forEach(v => { userData.verbs[v].streak = Math.max(0, userData.verbs[v].streak - 2); });
            userData.lastActive = today;
            localStorage.setItem('pySpanishV4', JSON.stringify(userData));
        }

        let state = { currentVerb: "hablar", currentTense: null, currentPronounIdx: 0, correctAnswer: "", globalScore: 0 };

        const elInput = document.getElementById('answerInput');
        const elFeedback = document.getElementById('feedback');

        const removeAccents = (str) => str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        function calculateGlobalScore() {
            state.globalScore = Object.values(userData.verbs).reduce((sum, v) => sum + v.streak, 0);
            document.getElementById('globalScoreDisplay').innerText = `Global Mastery: ${state.globalScore}`;
        }

        function getConjugation(verbInf, tenseId, pIdx) {
            const v = verbsDB[verbInf];
            if (tenseId === "future") return (v.futRoot || verbInf) + regularEndings.future[pIdx];
            if (tenseId === "conditional") return (v.futRoot || verbInf) + regularEndings.conditional[pIdx];
            if (v.type === "irr") return v[tenseId][pIdx];
            return v.root + regularEndings[tenseId][v.type][pIdx];
        }

        function renderSidebar() {
            calculateGlobalScore();
            const elVerbList = document.getElementById('verbList');
            const elWikiSelect = document.getElementById('wikiVerbSelect');
            elVerbList.innerHTML = ""; elWikiSelect.innerHTML = "";

            Object.entries(verbsDB).forEach(([v, data]) => {
                const isLocked = state.globalScore < data.unlockReq;
                const streak = userData.verbs[v].streak;
                
                const div = document.createElement('div');
                div.className = `verb-chip ${v === state.currentVerb ? 'selected' : ''} ${isLocked ? 'locked' : ''}`;
                if (isLocked) {
                    div.innerHTML = `🔒 ${v} <span class="chip-streak">Req: ${data.unlockReq}</span>`;
                } else {
                    div.innerHTML = `${v} <span class="chip-streak">🔥 ${streak}</span>`;
                    div.onclick = () => { state.currentVerb = v; renderSidebar(); generateQuestion(); };
                }
                elVerbList.appendChild(div);

                const opt = document.createElement('option');
                opt.value = v; opt.innerText = isLocked ? `🔒 ${v} (Locked)` : `${v} (🔥 ${streak})`;
                elWikiSelect.appendChild(opt);
            });
            elWikiSelect.value = state.currentVerb;
        }

        function generateQuestion() {
            const streak = userData.verbs[state.currentVerb].streak;
            let available = tenses.filter(t => streak >= t.req);
            
            state.currentTense = available[Math.floor(Math.random() * available.length)];
            state.currentPronounIdx = Math.floor(Math.random() * pronouns.length);
            state.correctAnswer = getConjugation(state.currentVerb, state.currentTense.id, state.currentPronounIdx);

            document.getElementById('displayTense').innerText = state.currentTense.name;
            document.getElementById('displayLevel').innerText = `🔥 ${streak}`;
            document.getElementById('displayPronoun').innerText = pronouns[state.currentPronounIdx].toUpperCase();
            document.getElementById('displayInfinitive').innerText = state.currentVerb;
            
            elInput.value = "";
            elFeedback.className = "feedback";
            elInput.focus();
        }

        function generateRuleText(verbInf, tenseId, pIdx) {
            if (tenseId === "subjunctive") return `Subjunctive mode: Used for doubts, wishes (e.g. 'Quiero que vos...').`;
            const v = verbsDB[verbInf];
            if (v.type === "irr" && ["present", "preterite", "imperfect"].includes(tenseId)) return `Irregular verb in the ${tenseId}.`;
            if (tenseId === "future" || tenseId === "conditional") return `Add ending to the ${v.futRoot ? "irregular stem" : "infinitive"}.`;
            return `Regular ${v.type} verb. Follow standard ending rules.`;
        }

        function checkAnswer() {
            const rawUser = elInput.value.trim().toLowerCase();
            const rawCorrect = state.correctAnswer.toLowerCase();
            if (!rawUser) return;

            const isStrict = document.getElementById('strictAccentsToggle').checked;
            elFeedback.className = "feedback show";

            let isCorrect = false, feedbackType = "", titleText = "";

            if (rawUser === rawCorrect) {
                isCorrect = true; feedbackType = "correct"; titleText = "¡Perfecto! 🔥";
            } else if (!isStrict && removeAccents(rawUser) === removeAccents(rawCorrect)) {
                isCorrect = true; feedbackType = "warning"; titleText = `Pass! Note accent: ${rawCorrect}`;
            } else {
                feedbackType = "incorrect"; titleText = `Incorrect. Answer: ${rawCorrect}`;
            }

            if (isCorrect) {
                userData.verbs[state.currentVerb].streak++;
                elFeedback.innerHTML = `<div class="fb-title">${titleText}</div>`;
                elFeedback.classList.add(feedbackType);
                localStorage.setItem('pySpanishV4', JSON.stringify(userData));
                renderSidebar();
                setTimeout(() => generateQuestion(), 1000);
            } else {
                userData.verbs[state.currentVerb].streak = Math.max(0, userData.verbs[state.currentVerb].streak - 2);
                const obj = verbsDB[state.currentVerb].obj;
                const p = pronouns[state.currentPronounIdx].split('/')[0];
                
                elFeedback.innerHTML = `
                    <div class="fb-title">${titleText}</div>
                    <div class="fb-rule">Rule: ${generateRuleText(state.currentVerb, state.currentTense.id, state.currentPronounIdx)}</div>
                    <div class="fb-example">Ejemplo: ${p.charAt(0).toUpperCase() + p.slice(1)} ${rawCorrect} ${obj}.</div>
                `;
                elFeedback.classList.add(feedbackType);
                localStorage.setItem('pySpanishV4', JSON.stringify(userData));
                renderSidebar();
            }
        }

        function renderWikiView(verbInf) {
            if (!verbInf) verbInf = state.currentVerb; // Fallback safety
            const v = verbsDB[verbInf];
            document.getElementById('wikiInfinitive').innerText = verbInf;
            document.getElementById('wikiTranslation').innerText = `"${v.trans}"`;
            document.getElementById('wikiDesc').innerText = v.desc;
            
            const grid = document.getElementById('wikiGrid');
            grid.innerHTML = "";

            tenses.forEach(t => {
                let html = `
                    <div class="tense-table">
                        <div class="tense-table-header"><span>${t.name}</span> <span style="color:#52525b; font-size:0.8rem">Req: 🔥${t.req}</span></div>
                `;
                pronouns.forEach((p, idx) => {
                    const conj = getConjugation(verbInf, t.id, idx);
                    html += `
                        <div class="tense-row">
                            <div class="tense-pro">${p}</div>
                            <div class="tense-conj">${conj}</div>
                        </div>
                    `;
                });
                html += `</div>`;
                grid.innerHTML += html;
            });
        }

        // Nav
        document.getElementById('btnPractice').onclick = (e) => {
            e.target.classList.add('active'); document.getElementById('btnWiki').classList.remove('active');
            document.getElementById('viewPractice').classList.remove('hidden'); document.getElementById('viewWiki').classList.remove('visible');
            document.getElementById('topMenu').classList.remove('open');
            generateQuestion(); 
        };
        
        document.getElementById('btnWiki').onclick = (e) => {
            e.target.classList.add('active'); document.getElementById('btnPractice').classList.remove('active');
            document.getElementById('viewPractice').classList.add('hidden'); document.getElementById('viewWiki').classList.add('visible');
            document.getElementById('topMenu').classList.remove('open');
            // Ensure we are rendering what is currently selected in the dropdown
            renderWikiView(document.getElementById('wikiVerbSelect').value);
        };

        document.getElementById('wikiVerbSelect').addEventListener('change', (e) => { renderWikiView(e.target.value); });

        // Listeners
        document.getElementById('submitBtn').addEventListener('click', checkAnswer);
        elInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });

        // Init Flow
        renderSidebar();
        generateQuestion();
        renderWikiView(state.currentVerb); // Pre-render the wiki in the background to prevent blank loading!
    </script>
</body>
</html>
